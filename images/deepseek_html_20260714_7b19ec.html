<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квадратна картинка</title>
    <style>
        .square-image {
            width: 300px;          /* Задаємо ширину */
            height: 300px;         /* Висота = ширина → квадрат */
            object-fit: cover;    /* Заповнює квадрат, обрізаючи зайве */
            border-radius: 12px;  /* Необов'язково — заокруглені кути */
            border: 2px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h2>Квадратне зображення</h2>
    <!-- Замініть src на ваше зображення -->
    <img 
        src="https://placekitten.com/400/400" 
        alt="Квадратна картинка" 
        class="square-image"
    >
</body>
</html>
