<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Полная карта Django — SIM MAPS</title>
    <style>
        body { font-family: Arial; text-align: center; margin: 20px; }
        a { color: #2980b9; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .map-container { overflow: auto; max-height: 80vh; border: 1px solid #ddd; display: inline-block; }
        .zoom-img { width: 100%; max-width: 100%; display: block; cursor: zoom-in; transition: max-width 0.3s ease; }
        .zoom-toggle { display: none; }
        .zoom-toggle:checked + .map-container .zoom-img { max-width: none; cursor: zoom-out; }
        .zoom-label { display: inline-block; margin: 10px 0; padding: 8px 16px; background: #2980b9; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🗺️ Полная карта архитектуры Django (100%)</h1>
    <p>Инженерный чертёж для архитектора. Все слои, связи и компоненты.</p>
    
    <label class="zoom-label" for="zoom-toggle">🔍 Лупа</label>
    <input type="checkbox" id="zoom-toggle" class="zoom-toggle">
    
    <div class="map-container">
        <img src="img/full-map.png" alt="Полная карта Django" style="max-width: 1000%; height: auto; cursor: zoom-in;">
    </div>
    
    <p>
        <a href="index.html">← К карте Django</a> | 
        <a href="nodes/">📖 Оглавление</a>
    </p>
</body>
</html>
